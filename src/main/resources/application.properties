# ─── Application ───────────────────────────────────────────
spring.application.name=notification-service

# ─── MySQL Database ────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/notification_db
spring.datasource.username=notif_user
spring.datasource.password=notif_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ───────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ─── Server ────────────────────────────────────────────────
server.port=8081

# ─── API Key Security ──────────────────────────────────────
app.api-key=indiagold-secret-key-2026

# ─── Logging ───────────────────────────────────────────────
logging.level.com.indiagold=DEBUG
logging.level.org.springframework.security=WARN